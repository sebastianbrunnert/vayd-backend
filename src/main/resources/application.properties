# Console output settings
logging.level.org.springframework=ERROR
logging.pattern.console=%clr(%d{yy-MM-dd E HH:mm:ss.SSS}){blue} %clr(%-5p) %clr(%logger{0}){blue} %clr(%m){faint}%n
spring.main.banner-mode=OFF

# Default port
server.port=10124

# SQL settings
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.datasource.driverClassName=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://root@localhost:3306/vayd
spring.jpa.generate-ddl=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true

# Max file size
spring.servlet.multipart.max-file-size=256MB
spring.servlet.multipart.max-request-size=256MB
server.tomcat.max-http-form-post-size=28999999
server.tomcat.max-swallow-size=28999999

spring.config.import=optional:file:.env[.properties]

# Mail Server
mailer.host=${MAILER_HOST}
mailer.port=${MAILER_PORT}
mailer.username=${MAILER_USERNAME}
mailer.password=${MAILER_PASSWORD}
mailer.from=${MAILER_FROM}

# Google
google.client-id=${GOOGLE_CLIENT_ID}
google.client-secret=${GOOGLE_CLIENT_SECRET}