plugins {
    // Apply the application plugin to add support for building a CLI application in Java.
    id 'application'

    // The JaCoCo plugin provides code coverage metrics for Java code via integration with JaCoCo.
    id 'jacoco'

    // Use Spring Boot
    id 'org.springframework.boot' version '3.4.3'
}

repositories {
    // Use Maven Central for resolving dependencies.
    mavenCentral()
}

apply plugin: 'io.spring.dependency-management'

dependencies {
    // Use JUnit Jupiter for testing.
    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.3'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'

    // Use Spring Boot Starter Test for testing
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    // Use Spring Boot Starter Web for API
    implementation 'org.springframework.boot:spring-boot-starter-web'

    // Use Spring Boot Starter Data JPA for database
    implementation 'org.springframework.boot:spring-boot-starter-data-jpa'
    implementation 'com.mysql:mysql-connector-j:8.2.0'

    // Use Spring Boot Starter Security for security
    implementation 'org.springframework.boot:spring-boot-starter-security'
    implementation 'org.springframework.security:spring-security-oauth2-resource-server'

    // Use JWT for security
    implementation 'io.jsonwebtoken:jjwt:0.9.1'
    implementation 'javax.xml.bind:jaxb-api:2.3.1'

    // Use lombok for getter and setter
    compileOnly 'org.projectlombok:lombok:1.18.36'
    annotationProcessor 'org.projectlombok:lombok:1.18.36'

    // Use AWS S3 for managing Digital Ocean Spaces
    implementation 'com.amazonaws:aws-java-sdk-s3:1.12.9'

    // Use JavaxMail for sending emails
    implementation 'com.sun.mail:javax.mail:1.6.2'

    // Use Reflections for classpath scanning
    implementation 'org.reflections:reflections:0.10.2'

    // PDFBox
    implementation 'org.apache.pdfbox:pdfbox:2.0.28'
}

java {
    toolchain {
        // Apply a specific Java toolchain to ease working on different environments.
        languageVersion = JavaLanguageVersion.of(21)
    }
}

application {
    // Define the main class for the application.
    mainClass = 'de.vayd.sebastianbrunnert.Vayd'
}

run {
    // Enable assertions when starting via Gradle.
    enableAssertions = true
}

tasks.named('test') {
    // Use JUnit Platform for unit tests.
    useJUnitPlatform()

    // Pass spring profile
    systemProperty "spring.profiles.active", System.getProperty("spring.profiles.active", "")

    // Enable assertions during testing.
    enableAssertions = true
}

jacocoTestReport {
    dependsOn test

    // Generate a Jacoco test report (.csv).
    reports {
        csv.required = true
    }
}

task coverageTotal {
    group "Verification"
    description "Produce the percentage for covered lines for Gitlab."
    dependsOn jacocoTestReport

    doLast {
        if (jacocoTestReport.reports.csv.outputLocation.isPresent()) {
            def missed = 0
            def covered = 0
            jacocoTestReport.reports.csv.outputLocation.get().getAsFile().eachLine { line ->
                def cols = line.split(',')
                def miss = cols[3]
                def cov = cols[4]
                assert miss == 'INSTRUCTION_MISSED' && cov == 'INSTRUCTION_COVERED' ||
                    miss.isInteger() && cov.isInteger() :
                    'Invalid jacoco CSV report'
                if (miss.isInteger()) {
                    missed += miss as Integer
                    covered += cov as Integer
                }
            }
            if (missed + covered > 0)
                printf '%.2f%% covered%n', covered / (missed + covered) * 100
            else
                println '100% covered'
        }
        else
            logger.warn('No jacoco coverage csv found.')
    }
}

javadoc {
    options.encoding = 'UTF-8'
    options.charSet = 'UTF-8'
    options.docEncoding = 'UTF-8'

    // Define pre/post/inv tags.
    options.tags = [
        'pre:cm:Preconditions:',
        'post:cm:Postconditions:',
        'inv:t:Invariants:'
    ]
}
